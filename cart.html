<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Your Cart — Biker's Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .cart-page { min-height:100vh; background:var(--bg); padding:calc(var(--nav-h) + 2.5rem) 0 5rem; }
    .cart-layout { display:grid; grid-template-columns:1fr 380px; gap:2rem; align-items:start; }
    @media(max-width:900px) { .cart-layout { grid-template-columns:1fr; } }

    /* Steps indicator */
    .checkout-steps { display:flex; align-items:center; margin-bottom:2.5rem; }
    .step { display:flex; align-items:center; gap:8px; }
    .step-num { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:800; border:2px solid var(--border); color:var(--text-3); }
    .step.active .step-num { border-color:var(--accent); color:var(--accent); background:rgba(255,87,34,.1); }
    .step.done .step-num { background:var(--accent); border-color:var(--accent); color:#fff; }
    .step-label { font-size:.78rem; font-weight:600; color:var(--text-3); }
    .step.active .step-label { color:var(--text); }
    .step.done .step-label { color:var(--text-2); }
    .step-line { flex:1; height:1px; background:var(--border); margin:0 .75rem; }
    .step.done + .step-line { background:var(--accent); }

    /* Cart items */
    .cart-items-wrap { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; backdrop-filter:blur(10px); }
    .cart-items-header { padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .cart-items-header h2 { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:2px; }
    .clear-cart-btn { font-size:.75rem; color:var(--text-3); border:none; background:none; cursor:pointer; transition:color .2s; }
    .clear-cart-btn:hover { color:#F44336; }

    .cart-item { display:flex; gap:1.25rem; padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); align-items:flex-start; }
    .cart-item:last-child { border-bottom:none; }
    .cart-item-img { width:80px; height:80px; border-radius:10px; object-fit:cover; background:var(--bg-3); flex-shrink:0; }
    .cart-item-details { flex:1; min-width:0; }
    .item-brand { font-size:.62rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--accent); margin-bottom:3px; }
    .item-name { font-weight:700; font-size:.95rem; margin-bottom:5px; line-height:1.3; }
    .item-meta { font-size:.75rem; color:var(--text-3); margin-bottom:.75rem; }
    .item-qty { display:flex; align-items:center; gap:0; }
    .iqty-btn { width:30px; height:30px; background:var(--bg-3); border:1px solid var(--border); color:var(--text); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:var(--transition); }
    .iqty-btn:first-child { border-radius:6px 0 0 6px; }
    .iqty-btn:last-child  { border-radius:0 6px 6px 0; }
    .iqty-btn:hover { background:rgba(255,87,34,.1); border-color:var(--accent); color:var(--accent); }
    .iqty-val { width:36px; height:30px; background:var(--bg-3); border-top:1px solid var(--border); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; }
    .item-price-col { text-align:right; flex-shrink:0; }
    .item-price { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:var(--accent); line-height:1; }
    .item-remove { font-size:.72rem; color:var(--text-3); cursor:pointer; transition:color .2s; border:none; background:none; margin-top:.4rem; display:block; width:100%; }
    .item-remove:hover { color:#F44336; }

    .cart-empty-state { text-align:center; padding:5rem 2rem; }
    .empty-icon { font-size:4rem; margin-bottom:1.25rem; }
    .cart-empty-state h3 { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:2px; margin-bottom:.75rem; }
    .cart-empty-state p { color:var(--text-2); margin-bottom:2rem; }

    /* Summary */
    .cart-summary { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; backdrop-filter:blur(10px); position:sticky; top:calc(var(--nav-h) + 1rem); }
    .summary-title { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:2px; margin-bottom:1.25rem; }
    .summary-row { display:flex; justify-content:space-between; align-items:center; padding:.6rem 0; font-size:.88rem; color:var(--text-2); border-bottom:1px solid var(--border); }
    .summary-row:last-of-type { border-bottom:none; }
    .summary-row.total { padding-top:1rem; margin-top:.25rem; border-top:1px solid var(--border); font-weight:800; color:var(--text); font-size:1rem; }
    .summary-row.total span:last-child { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--accent); }
    .checkout-btn { display:block; width:100%; padding:16px; text-align:center; background:var(--accent); color:#fff; border-radius:10px; font-weight:800; font-size:1rem; letter-spacing:1px; text-transform:uppercase; transition:var(--transition); margin-top:1.25rem; border:none; cursor:pointer; box-shadow:0 4px 24px rgba(255,87,34,.3); }
    .checkout-btn:hover { background:#E64A19; transform:translateY(-2px); box-shadow:0 8px 32px rgba(255,87,34,.5); }
    .checkout-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .continue-link { display:block; text-align:center; margin-top:.75rem; font-size:.8rem; color:var(--text-3); }
    .continue-link:hover { color:var(--accent); }

    .promo-wrap { margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid var(--border); }
    .promo-label { font-size:.7rem; color:var(--text-3); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:.5rem; }
    .promo-row { display:flex; gap:.5rem; }
    .promo-input { flex:1; padding:10px 12px; background:var(--bg-3); border:1px solid var(--border); border-radius:7px; color:var(--text); font-family:'Montserrat',sans-serif; font-size:.85rem; outline:none; }
    .promo-input:focus { border-color:var(--accent); }
    .promo-btn { padding:10px 16px; background:var(--bg-3); border:1px solid var(--border); border-radius:7px; color:var(--text-2); font-size:.8rem; font-weight:600; cursor:pointer; transition:var(--transition); }
    .promo-btn:hover { border-color:var(--accent); color:var(--accent); }
    .promo-msg { font-size:.75rem; margin-top:.4rem; }
    .promo-success { color:#4CAF50; }
    .promo-error   { color:#F44336; }

    .safe-icons { display:flex; justify-content:center; gap:1rem; margin-top:1.25rem; }
    .safe-icon { font-size:.7rem; color:var(--text-3); display:flex; align-items:center; gap:4px; }
  </style>
</head>
<body>
  <div id="cursor-dot"></div>
  <div id="cursor-ring"></div>
  <div id="navbar-placeholder"></div>

  <div class="cart-page">
    <div class="container">

      <!-- Steps -->
      <div class="checkout-steps">
        <div class="step active"><div class="step-num">1</div><div class="step-label">Cart</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">2</div><div class="step-label">Details</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">3</div><div class="step-label">Payment</div></div>
        <div class="step-line"></div>
        <div class="step"><div class="step-num">4</div><div class="step-label">Done</div></div>
      </div>

      <div class="cart-layout" id="cart-layout">
        <!-- Items -->
        <div class="cart-items-wrap" id="cart-items-wrap">
          <div class="cart-items-header">
            <h2>Your Cart</h2>
            <button class="clear-cart-btn" onclick="clearAll()">Clear All</button>
          </div>
          <div id="cart-items-body"></div>
        </div>

        <!-- Summary -->
        <div class="cart-summary" id="cart-summary">
          <div class="summary-title">Order Summary</div>
          <div id="summary-rows"></div>
          <div class="summary-row total"><span>Total</span><span id="summary-total">₹0</span></div>

          <button class="checkout-btn" id="checkout-btn" onclick="proceedToCheckout()">
            Proceed to Checkout →
          </button>
          <a href="index.html" class="continue-link">← Continue Shopping</a>

          <div class="promo-wrap">
            <div class="promo-label">Promo Code</div>
            <div class="promo-row">
              <input type="text" class="promo-input" id="promo-input" placeholder="Enter code (try BIKER10)"/>
              <button class="promo-btn" onclick="applyPromo()">Apply</button>
            </div>
            <div class="promo-msg" id="promo-msg"></div>
          </div>

          <div class="safe-icons">
            <div class="safe-icon">🔒 Secure</div>
            <div class="safe-icon">🚚 Fast Delivery</div>
            <div class="safe-icon">🔄 Easy Returns</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer class="footer" style="padding:2rem 0;">
    <div class="container" style="text-align:center;">
      <p style="color:var(--text-3);font-size:.8rem;">© 2025 Biker's Hub · <a href="index.html" style="color:var(--accent);">Home</a></p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script>
    BH.initPage('');

    let discount = 0;

    function renderCart() {
      const cart = BH.getCart();
      const body = document.getElementById('cart-items-body');
      const btn  = document.getElementById('checkout-btn');

      if (!cart.length) {
        document.getElementById('cart-layout').innerHTML = `
          <div class="cart-empty-state" style="grid-column:1/-1">
            <div class="empty-icon">🛒</div>
            <h3>Your Cart is Empty</h3>
            <p>Add some premium riding gear to get started!</p>
            <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
              <a href="helmets.html" class="btn btn-primary">Shop Helmets</a>
              <a href="jackets.html" class="btn btn-ghost">Shop Jackets</a>
              <a href="gloves.html"  class="btn btn-ghost">Shop Gloves</a>
            </div>
          </div>`;
        return;
      }

      body.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.img}" alt="${item.name}" class="cart-item-img"/>
          <div class="cart-item-details">
            <div class="item-brand">${item.brand}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-meta">Size: ${item.size} · Color: ${item.color}</div>
            <div class="item-qty">
              <button class="iqty-btn" onclick="changeQty('${item.key}', -1)">−</button>
              <div class="iqty-val">${item.qty}</div>
              <button class="iqty-btn" onclick="changeQty('${item.key}', 1)">+</button>
            </div>
          </div>
          <div class="item-price-col">
            <div class="item-price">₹${(item.price * item.qty).toLocaleString('en-IN')}</div>
            <button class="item-remove" onclick="removeItem('${item.key}')">✕ Remove</button>
          </div>
        </div>
      `).join('');

      // Summary rows
      const subtotal = BH.getCartTotal();
      const shipping = subtotal > 5000 ? 0 : 199;
      const discountAmt = Math.round(subtotal * discount);
      const total = subtotal + shipping - discountAmt;

      document.getElementById('summary-rows').innerHTML = `
        <div class="summary-row"><span>Subtotal (${BH.getCartCount()} items)</span><span>₹${subtotal.toLocaleString('en-IN')}</span></div>
        <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? '<span style="color:#4CAF50">Free</span>' : '₹' + shipping}</span></div>
        ${discountAmt > 0 ? `<div class="summary-row" style="color:#4CAF50;"><span>Promo Discount</span><span>−₹${discountAmt.toLocaleString('en-IN')}</span></div>` : ''}
      `;
      document.getElementById('summary-total').textContent = '₹' + total.toLocaleString('en-IN');
      if (btn) btn.disabled = false;

      // Store total for checkout
      sessionStorage.setItem('bh_order_total', total);
      sessionStorage.setItem('bh_order_shipping', shipping);
    }

    function changeQty(key, delta) {
      const cart = BH.getCart();
      const item = cart.find(i => i.key === key);
      if (item) BH.updateQty(key, item.qty + delta);
      renderCart();
    }

    function removeItem(key) {
      BH.removeFromCart(key);
      renderCart();
    }

    function clearAll() {
      if (confirm('Clear entire cart?')) { BH.clearCart(); renderCart(); }
    }

    const PROMOS = { 'BIKER10': 0.10, 'MUMBAI15': 0.15, 'GEAR20': 0.20 };
    function applyPromo() {
      const code = document.getElementById('promo-input').value.trim().toUpperCase();
      const msg  = document.getElementById('promo-msg');
      if (PROMOS[code]) {
        discount = PROMOS[code];
        msg.className = 'promo-msg promo-success';
        msg.textContent = `✓ ${Math.round(discount*100)}% discount applied!`;
      } else {
        discount = 0;
        msg.className = 'promo-msg promo-error';
        msg.textContent = '✗ Invalid promo code';
      }
      renderCart();
    }

    function proceedToCheckout() {
      location.href = 'checkout.html';
    }

    renderCart();
  </script>
</body>
</html>
